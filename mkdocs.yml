site_name: Mukesh Technical Knowledge Base
site_description: Static Markdown notes for SaasHQ technical setup and operations.
site_url: https://blog.saashq.in/

theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
  palette:
    - scheme: default
      primary: blue grey
      accent: blue

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite

nav:
  - Home: index.md
  - Cloudflare Email Routing: cloudflare-email-routing.md
  - Fleet MDM: fleet-mdm.md
  - Contribution Guide: page-template.md
