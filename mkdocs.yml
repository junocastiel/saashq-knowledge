site_name: Mukesh Technical Knowledge Base
site_description: Static documentation for technical execution notes, runbooks, decisions, and troubleshooting.
site_url: https://blog.saashq.in/

theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
  palette:
    - scheme: default
      primary: blue grey
      accent: blue

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite

nav:
  - Home: index.md
  - Execution Logs:
      - Cloudflare Email Routing for Fleet MDM: execution-logs/cloudflare-mdm-email-routing.md
  - Runbooks:
      - Overview: runbooks/index.md
  - Infrastructure:
      - Overview: infrastructure/index.md
      - Cloudflare: infrastructure/cloudflare/index.md
  - Device Management:
      - Overview: device-management/index.md
  - Decisions:
      - Overview: decisions/index.md
  - Troubleshooting:
      - Overview: troubleshooting/index.md
  - Page Templates:
      - Execution Note Template: page-templates/execution-note-template.md
